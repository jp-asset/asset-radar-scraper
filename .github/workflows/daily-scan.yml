name: Asset Radar - Scan Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          pip install -r requirements.txt

      - name: Correr o scan completo
        run: |
          python run_scan.py
        env:
          OUTPUT_PATH: data/opportunities.json
          DEBUG_HTML_DIR: debug_html
          SCRAPFLY_API_KEY: ${{ secrets.SCRAPFLY_API_KEY }}

      - name: Guardar amostras de HTML para calibração (artifact temporário)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-samples
          path: debug_html/
          retention-days: 7
          if-no-files-found: ignore

      - name: Fazer commit dos resultados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asset Radar Bot"
          git add data/opportunities.json
          git diff --staged --quiet || git commit -m "Scan diário automático — $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Tentativa $i falhou, a repetir..."
            sleep 5
          done
