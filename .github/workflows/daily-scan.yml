name: Asset Radar - Scan Diário

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependências Python
        run: |
          pip install -r requirements.txt

      - name: Correr o scan completo
        run: |
          python run_scan.py
        env:
          OUTPUT_PATH: data/opportunities.json
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
          MAX_RESULTS_PER_SOURCE: "50"

      - name: Fazer commit dos resultados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Asset Radar Bot"
          git add data/opportunities.json
          git diff --staged --quiet || git commit -m "Scan diário automático — $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Tentativa $i falhou, a repetir..."
            sleep 5
          done
